services:
  - type: web
    name: twitter-ai-agent
    runtime: node
    plan: starter
    buildCommand: npm install && node scripts/ensure-browser.js
    startCommand: npm start
    envVars:
      - key: HEADLESS
        value: "true"
      - key: NODE_VERSION
        value: "20"
      - key: STORAGE_STATE_JSON
        sync: false
      - key: STORAGE_STATE_BASE64
        sync: false
