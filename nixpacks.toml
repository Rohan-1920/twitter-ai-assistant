# Used when Railway builds with Nixpacks (not Dockerfile).
# Fixes: error while loading shared libraries: libglib-2.0.so.0

[phases.setup]
aptPkgs = [
  "libglib2.0-0",
  "libglib2.0-0t64",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxcb1",
  "libxkbcommon0",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libasound2t64",
  "libatspi2.0-0",
  "libxshmfence1",
  "libgtk-3-0",
  "fonts-liberation",
  "fonts-noto-color-emoji",
  "ca-certificates",
]

[phases.install]
cmds = [
  "npm install --omit=dev",
  "npx playwright install --with-deps chromium",
]
